name: Build Guide Markdown to PDF and Commit

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: guide-commit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CJK fonts for Japanese/Chinese/Korean support
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install md-to-pdf
        run: npm install -g md-to-pdf

      - name: Convert guide_*.md to PDF
        run: |
          mkdir -p pdf
          shopt -s nullglob nocaseglob
          for file in guide_*.md; do
            echo "Processing $file"
            md-to-pdf "$file" \
              --basedir "$(pwd)" \
              --stylesheet "$(pwd)/.github/workflows/pdf-style.css" \
              --launch-options '{"args":["--no-sandbox","--disable-setuid-sandbox"]}'
            mv "${file%.*}.pdf" pdf/
          done

      - name: Upload PDFs to Actions artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guide-pdfs
          path: pdf/*.pdf

      - name: Commit PDFs back to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add pdf/*.pdf
          if ! git diff --cached --quiet; then
            git commit -m "Update guide PDFs [skip ci]"
            REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            BRANCH="${GITHUB_REF_NAME}"
            for attempt in 1 2 3 4 5; do
              if git push "$REMOTE" "HEAD:${BRANCH}"; then
                echo "Push succeeded on attempt $attempt"
                exit 0
              fi
              echo "Push rejected on attempt $attempt; rebasing onto latest ${BRANCH}"
              git pull --rebase "$REMOTE" "${BRANCH}"
              sleep $((attempt * 2))
            done
            echo "Push failed after retries" >&2
            exit 1
          else
            echo "No changes in PDFs, skipping commit."
          fi