name: Build Guide Markdown to EPUB and Commit

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'guide_*.md'

permissions:
  contents: write

concurrency:
  group: guide-commit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-epub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Convert guide_*.md to EPUB
        run: |
          export LC_ALL=C.UTF-8
          mkdir -p epub
          shopt -s nullglob nocaseglob
          for file in guide_*.md; do
            echo "Processing $file"
            # Extract title from first H1 or filename
            TITLE=$(grep -m 1 '^# ' "$file" | sed 's/^# //')
            if [ -z "$TITLE" ]; then
              TITLE="${file%.*}"
            fi
            # Use -f markdown-yaml_metadata_block to avoid issues with --- in some files
            pandoc "$file" -o "epub/${file%.*}.epub" -f markdown-yaml_metadata_block+lists_without_preceding_blankline --lua-filter .github/workflows/pre_to_lines.lua --metadata title="$TITLE" --css .github/workflows/epub-style.css
          done

      - name: Commit EPUBs back to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add epub/*.epub
          if ! git diff --cached --quiet; then
            git commit -m "Update guide EPUBs [skip ci]"
            REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            BRANCH="${{ github.ref_name }}"
            for attempt in 1 2 3 4 5; do
              if git push "$REMOTE" "HEAD:${BRANCH}"; then
                echo "Push succeeded on attempt $attempt"
                exit 0
              fi
              echo "Push rejected on attempt $attempt; rebasing onto latest ${BRANCH}"
              git fetch "$REMOTE" "${BRANCH}"
              git rebase "FETCH_HEAD"
              sleep $((attempt * 2))
            done
            echo "Push failed after retries" >&2
            exit 1
          else
            echo "No changes in EPUBs, skipping commit."
          fi
