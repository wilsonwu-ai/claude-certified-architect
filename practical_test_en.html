: false}, {"letter": "B", "text": "Instruct Claude to request an additional identifier (email, phone, or order number) when `get_customer` returns multiple matches before taking any customer-specific action.", "correct": true}, {"letter": "C", "text": "Modify `get_customer` to return only a single most-likely match based on a ranking algorithm, eliminating ambiguity.", "correct": false}, {"letter": "D", "text": "Add few-shot examples to the prompt demonstrating correct reasoning and tool sequencing for ambiguous matches.", "correct": false}], "correct": "B", "explanation": "Asking the user for an additional identifier is the most reliable way to resolve ambiguity because the user has definitive knowledge of their identity. One extra conversational turn is a small price to pay to eliminate a 15% error rate caused by choosing the wrong account.", "global_n": 55}, {"n": 56, "scenario": "Customer Support Agent", "situation": "Production logs show a consistent pattern: when customers include the word “account” in their message (e.g., “I want to check my account for an order I made yesterday”), the agent calls `get_customer` first 78% of the time. When customers phrase similar requests without “account” (e.g., “I want to check an order I made yesterday”), it calls `lookup_order` first 93% of the time. Tool descriptions are clear and unambiguous. What is the most likely root cause of this discrepancy?", "question": "What is the most likely root cause?", "options": [{"letter": "A", "text": "The system prompt contains keyword-sensitive instructions that steer behavior based on terms like “account,” creating unintended tool-selection patterns.", "correct": true}, {"letter": "B", "text": "The model’s base training creates associations between “account” terminology and customer-related operations that override tool descriptions.", "correct": false}, {"letter": "C", "text": "The model needs more training data on multi-concept messages and should be fine-tuned on examples containing both account and order terminology.", "correct": false}, {"letter": "D", "text": "Tool descriptions need additional negative examples specifying when NOT to use each tool to prevent this keyword-induced confusion.", "correct": false}], "correct": "A", "explanation": "The systematic keyword-driven pattern (78% vs 93%) strongly indicates explicit routing logic in the system prompt reacting to the word “account” and steering the agent toward customer-related tools. Since tool descriptions are already clear, the discrepancy points to prompt-level instructions creating unintended behavioral steering.", "global_n": 56}, {"n": 57, "scenario": "Customer Support Agent", "situation": "Production logs show the agent often calls `get_customer` when users ask about orders (e.g., “check my order #12345”) instead of calling `lookup_order`. Both tools have minimal descriptions (“Gets customer information” / “Gets order details”) and accept similar-looking identifier formats. What is the most effective first step to improve tool selection reliability?", "question": "What is the most effective first step?", "options": [{"letter": "A", "text": "Implement a routing layer that analyzes user input before each turn and preselects the correct tool based on detected keywords and ID patterns.", "correct": false}, {"letter": "B", "text": "Combine both tools into a single `lookup_entity` that accepts any identifier and internally decides which backend to query.", "correct": false}, {"letter": "C", "text": "Add few-shot examples to the system prompt demonstrating correct tool selection patterns, with 5–8 examples routing order-related queries to `lookup_order`.", "correct": false}, {"letter": "D", "text": "Expand each tool’s description to include input formats, example queries, edge cases, and boundaries explaining when to use it versus similar tools.", "correct": true}], "correct": "D", "explanation": "Expanding tool descriptions with input formats, example queries, edge cases, and clear boundaries directly fixes the root cause—minimal descriptions that don’t give the LLM enough information to distinguish similar tools. It’s a low-effort, high-impact first step that improves the primary mechanism the LLM uses for tool selection.", "global_n": 57}, {"n": 58, "scenario": "Customer Support Agent", "situation": "You are implementing the agent loop for your support agent. After each Claude API call, you must decide whether to continue the loop (run requested tools and call Claude again) or stop (present the final answer to the customer). What determines this decision?", "question": "What determines this decision?", "options": [{"letter": "A", "text": "Check the `stop_reason` field in Claude’s response—continue if it is `tool_use` and stop if it is `end_turn`.", "correct": true}, {"letter": "B", "text": "Parse Claude’s text for phrases like “I’m done” or “Can I help with anything else?”—natural language signals indicate task completion.", "correct": false}, {"letter": "C", "text": "Set a maximum iteration count (e.g., 10 calls) and stop when reached, regardless of whether Claude indicates more work is needed.", "correct": false}, {"letter": "D", "text": "Check whether the response contains assistant text content—if Claude generated explanatory text, the loop should terminate.", "correct": false}], "correct": "A", "explanation": "`stop_reason` is Claude’s explicit structured signal for loop control: `tool_use` indicates Claude wants to run a tool and receive results back, while `end_turn` indicates Claude has completed its response and the loop should end.", "global_n": 58}, {"n": 59, "scenario": "Customer Support Agent", "situation": "Production logs show the agent misinterprets outputs from your MCP tools: Unix timestamps from `get_customer`, ISO 8601 dates from `lookup_order`, and numeric status codes (1=pending, 2=shipped). Some tools are third-party MCP servers you cannot modify. Which approach to data format normalization is most maintainable?", "question": "Which approach is most maintainable?", "options": [{"letter": "A", "text": "Use a PostToolUse hook to intercept tool outputs and apply formatting transformations before the agent processes them.", "correct": true}, {"letter": "B", "text": "Modify tools you control to return human-readable formats and create wrappers for third-party tools.", "correct": false}, {"letter": "C", "text": "Create a `normalize_data` tool that the agent calls after every data retrieval to transform values.", "correct": false}, {"letter": "D", "text": "Add detailed format documentation to the system prompt explaining each tool’s data conventions.", "correct": false}], "correct": "A", "explanation": "A PostToolUse hook provides a centralized, deterministic point to intercept and normalize all tool outputs—including third-party MCP server data—before the agent processes them. It’s more maintainable because transformations live in code and apply uniformly, rather than relying on LLM interpretation.", "global_n": 59}, {"n": 60, "scenario": "Customer Support Agent", "situation": "Production logs show the agent sometimes chooses `get_customer` when `lookup_order` would be more appropriate, especially for ambiguous queries like “I need help with my recent purchase.” You decide to add few-shot examples to the system prompt to improve tool selection. Which approach most effectively addresses the problem?", "question": "Which approach is most effective?", "options": [{"letter": "A", "text": "Add explicit “use when” and “don’t use when” guidance in each tool description covering ambiguous cases.", "correct": false}, {"letter": "B", "text": "Add examples grouped by tool—all `get_customer` scenarios together, then all `lookup_order` scenarios.", "correct": false}, {"letter": "C", "text": "Add 4–6 examples targeted at ambiguous scenarios, each with rationale for why one tool was chosen over plausible alternatives.", "correct": true}, {"letter": "D", "text": "Add 10–15 examples of clear, unambiguous requests demonstrating correct tool choice for typical scenarios for each tool.", "correct": false}], "correct": "C", "explanation": "Targeting few-shot examples at the specific ambiguous scenarios where errors occur, with explicit rationale for why one tool is preferable to alternatives, teaches the model the comparative decision process needed for edge cases. This is more effective than generic examples or declarative rules.", "global_n": 60}];

const state = { current: 0, answers: {} };

function md(text) {
  if (!text) return '';
  return text
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, ' ');
}

function buildSidebar() {
  const list = document.getElementById('sidebarList');
  document.getElementById('totalCount').textContent = QUESTIONS.length;
  let currentScenario = null;
  let groupEl = null;
  QUESTIONS.forEach((q, idx) => {
    if (q.scenario !== currentScenario) {
      currentScenario = q.scenario;
      const sg = document.createElement('div');
      sg.className = 'scenario-group';
      const lbl = document.createElement('div');
      lbl.className = 'scenario-label';
      lbl.textContent = q.scenario;
      sg.appendChild(lbl);
      groupEl = sg;
      list.appendChild(sg);
    }
    const btn = document.createElement('button');
    btn.className = 'q-btn';
    btn.id = 'sb-' + idx;
    btn.onclick = () => goto(idx);
    btn.innerHTML = '<span class="q-dot"></span> Q' + q.global_n;
    groupEl.appendChild(btn);
  });
}

function updateSidebar() {
  QUESTIONS.forEach((q, idx) => {
    const btn = document.getElementById('sb-' + idx);
    if (!btn) return;
    btn.className = 'q-btn';
    if (idx === state.current) btn.classList.add('active');
    const ans = state.answers[q.global_n];
    if (ans !== undefined) {
      btn.classList.add(ans === q.correct ? 'answered-correct' : 'answered-wrong');
    }
  });
  document.getElementById('answeredCount').textContent = Object.keys(state.answers).length;
}

function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  const chosen = state.answers[q.global_n];
  const locked = chosen !== undefined;

  document.getElementById('qCounter').textContent = (idx + 1) + ' / ' + QUESTIONS.length;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === QUESTIONS.length - 1;

  const optionsHtml = q.options.map(opt => {
    let cls = 'option';
    if (locked) {
      cls += ' locked';
      if (opt.correct) cls += ' correct';
      else if (opt.letter === chosen) cls += ' wrong';
      else cls += ' dimmed';
    }
    return '<div class="' + cls + '" data-letter="' + opt.letter + '" onclick="answer(' + q.global_n + ', \'' + opt.letter + '\')">' +
      '<div class="opt-letter">' + opt.letter + '</div>' +
      '<div class="opt-text">' + md(opt.text) + '</div></div>';
  }).join('');

  const expl = locked
    ? '<div class="explanation show"><strong>Why ' + q.correct + ':</strong> ' + md(q.explanation) + '</div>'
    : '<div class="explanation"></div>';

  document.getElementById('qCard').innerHTML =
    '<div class="q-number">Question ' + q.global_n + '</div>' +
    '<div class="q-scenario">' + q.scenario + '</div>' +
    '<div class="q-situation">' + md(q.situation) + '</div>' +
    '<div class="q-prompt">' + md(q.question) + '</div>' +
    '<div class="options">' + optionsHtml + '</div>' +
    expl;
}

function answer(globalN, letter) {
  if (state.answers[globalN] !== undefined) return;
  state.answers[globalN] = letter;
  renderQuestion(state.current);
  updateSidebar();
}

function navigate(dir) { goto(state.current + dir); }

function goto(idx) {
  if (idx < 0 || idx >= QUESTIONS.length) return;
  document.getElementById('questionScreen').classList.add('active');
  document.getElementById('summaryScreen').classList.remove('active');
  state.current = idx;
  renderQuestion(idx);
  updateSidebar();
}

function showSummary() {
  document.getElementById('questionScreen').classList.remove('active');
  document.getElementById('summaryScreen').classList.add('active');

  const total = QUESTIONS.length;
  const answered = Object.keys(state.answers).length;
  let correct = 0;
  const wrongByScenario = {};

  QUESTIONS.forEach(q => {
    const ans = state.answers[q.global_n];
    if (ans === undefined) return;
    if (ans === q.correct) {
      correct++;
    } else {
      if (!wrongByScenario[q.scenario]) wrongByScenario[q.scenario] = [];
      wrongByScenario[q.scenario].push({ q: q, chosen: ans });
    }
  });

  const wrong = answered - correct;
  const pct = answered > 0 ? Math.round(correct / answered * 100) : 0;
  const unanswered = total - answered;

  let wrongGroupsHtml = '';
  for (const scenario in wrongByScenario) {
    const items = wrongByScenario[scenario];
    const rows = items.map(item => {
      const chosenOpt = item.q.options.find(o => o.letter === item.chosen);
      const correctOpt = item.q.options.find(o => o.letter === item.q.correct);
      return '<div class="wrong-item">' +
        '<div class="wi-n">Q' + item.q.global_n + '</div>' +
        '<div class="wi-q">' +
          '<div class="wi-situation">' + md(item.q.situation) + '</div>' +
          '<div class="wi-prompt">' + md(item.q.question) + '</div>' +
          '<div class="wi-ans">' +
            'Your answer: <span class="wi-wrong-tag">' + item.chosen + '</span> — ' + md(chosenOpt ? chosenOpt.text : '') + '<br>' +
            'Correct: <span class="wi-correct-tag">' + item.q.correct + '</span> — ' + md(correctOpt ? correctOpt.text : '') +
          '</div>' +
        '</div></div>';
    }).join('');
    wrongGroupsHtml +=
      '<div class="group-block">' +
        '<div class="group-title">' + scenario +
          '<span class="group-badge">' + items.length + ' incorrect</span></div>' +
        rows +
      '</div>';
  }

  const unansweredNote = unanswered > 0
    ? '<p style="color:#e53e3e;font-size:14px;margin-bottom:20px;font-weight:600;">&#9888; ' + unanswered + ' question(s) not answered.</p>'
    : '';

  document.getElementById('summaryContent').innerHTML =
    '<h1>Exam Complete</h1>' +
    '<p class="summary-subtitle">You answered ' + answered + ' of ' + total + ' questions.</p>' +
    unansweredNote +
    '<div class="score-grid">' +
      '<div class="score-card total"><div class="big">' + pct + '%</div><div class="label">Score</div></div>' +
      '<div class="score-card correct-c"><div class="big">' + correct + '</div><div class="label">Correct</div></div>' +
      '<div class="score-card wrong-c"><div class="big">' + wrong + '</div><div class="label">Incorrect</div></div>' +
    '</div>' +
    (wrong > 0
      ? '<div class="section-title">Incorrect answers by scenario</div>' + wrongGroupsHtml
      : '<p style="color:#38a169;font-weight:700;font-size:17px;">All answered questions correct!</p>') +
    '<button class="restart-btn" onclick="restart()">Restart Exam</button>';
}

function restart() {
  state.answers = {};
  state.current = 0;
  document.getElementById('questionScreen').classList.add('active');
  document.getElementById('summaryScreen').classList.remove('active');
  renderQuestion(0);
  updateSidebar();
}

buildSidebar();
renderQuestion(0);
updateSidebar();
</script>
